name: Private Kernel Registry Validation

on:
  # Automatic CI is intentionally disabled to avoid paid GitHub Actions runs.
  # Maintainers can still run this workflow manually when private-registry
  # validation is needed.
  workflow_dispatch:

jobs:
  private-kernel-registry:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PRIVATE_REGISTRY_PORT: "4873"
      PRIVATE_KERNEL_REGISTRY_URL: http://127.0.0.1:4873
      PRIVATE_REGISTRY_USERNAME: agenc-ci
      PRIVATE_REGISTRY_EMAIL: ci+private-registry@tetsuo.ai
      PRIVATE_REGISTRY_PASSWORD: agenc-ci-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install --yes ripgrep
          rg --version

      - name: Initialize private registry env
        run: |
          echo "PRIVATE_REGISTRY_INSTANCE=${GITHUB_RUN_ID}-${GITHUB_JOB}" >> "$GITHUB_ENV"
          echo "PRIVATE_REGISTRY_TOKEN_FILE=${RUNNER_TEMP}/agenc-private-registry.token" >> "$GITHUB_ENV"
          echo "PRIVATE_REGISTRY_BOOTSTRAP_JSON=${RUNNER_TEMP}/agenc-private-registry-bootstrap.json" >> "$GITHUB_ENV"

      - name: Pin npm
        run: npm install --global npm@11.7.0

      - name: Verify npm version
        run: test "$(npm --version)" = "11.7.0"

      - name: Install workspace dependencies
        run: npm install --no-fund

      - name: Run required runtime validation lane
        run: npm run validate:runtime

      - name: Build private-kernel packages
        run: npm run build:private-kernel

      - name: Check private-kernel surface
        run: npm run check:private-kernel-surface

      - name: Validate local private-kernel distribution config
        run: npm run check:private-kernel-distribution:local

      - name: Run private registry script tests
        run: npm run test:private-registry-scripts

      - name: Reset any stale registry instance
        run: npm run private-registry:reset

      - name: Start locked private registry
        run: npm run private-registry:up

      - name: Wait for registry health
        run: npm run private-registry:health

      - name: Bootstrap registry service account
        run: |
          node scripts/bootstrap-private-registry-user.mjs --token-file "$PRIVATE_REGISTRY_TOKEN_FILE" > "$PRIVATE_REGISTRY_BOOTSTRAP_JSON"
          TOKEN="$(cat "$PRIVATE_REGISTRY_TOKEN_FILE")"
          echo "::add-mask::$TOKEN"
          echo "PRIVATE_KERNEL_REGISTRY_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Stage private-kernel distribution artifacts
        run: npm run stage:private-kernel-distribution:local

      - name: Dry-run private-kernel distribution against local registry
        run: npm run dry-run:private-kernel-distribution:local

      - name: Rehearse private-registry publish and install flows
        run: npm run private-registry:rehearse

      - name: Cleanup registry instance
        if: always()
        run: |
          npm run private-registry:reset
          rm -f "$PRIVATE_REGISTRY_TOKEN_FILE" "$PRIVATE_REGISTRY_BOOTSTRAP_JSON"
