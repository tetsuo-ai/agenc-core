name: required-gates

on:
  pull_request:
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  required-gates:
    name: agenc-m0-required
    runs-on: ubuntu-24.04
    timeout-minutes: 100
    permissions:
      contents: read
    steps:
      - name: Check out the exact candidate SHA
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Bind the checkout to the event SHA
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"

      - name: Run the complete required gate
        uses: ./.github/actions/required-gates
        with:
          expected-sha: ${{ github.sha }}
