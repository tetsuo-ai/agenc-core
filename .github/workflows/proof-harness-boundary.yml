name: Proof Harness Boundary

on:
  # Automatic CI is intentionally disabled to avoid paid GitHub Actions runs.
  # Maintainers can still run this workflow manually when proof-harness checks
  # are needed.
  workflow_dispatch:

jobs:
  proof-harness-boundary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install workspace dependencies
        run: npm install --no-fund

      - name: Check proof-harness boundary
        run: npm run check:proof-harness-boundary

      - name: Typecheck proof-harness workspace
        run: npm run typecheck --workspace=@tetsuo-ai/proof-harness-tools

      - name: Test proof-harness workspace
        run: npm run test --workspace=@tetsuo-ai/proof-harness-tools
