name: Proof Harness Boundary

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/proof-harness-boundary.yml"
      - "package.json"
      - "package-lock.json"
      - "tools/proof-harness/**"
      - "scripts/check-proof-harness-boundary.mjs"
      - "REFACTOR.MD"
      - "REFACTOR-MASTER-PROGRAM.md"
      - "docs/MAINNET_DEPLOYMENT.md"
      - "docs/devnet-program-data.md"
      - "docs/PRIVACY_README.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/proof-harness-boundary.yml"
      - "package.json"
      - "package-lock.json"
      - "tools/proof-harness/**"
      - "scripts/check-proof-harness-boundary.mjs"
      - "REFACTOR.MD"
      - "REFACTOR-MASTER-PROGRAM.md"
      - "docs/MAINNET_DEPLOYMENT.md"
      - "docs/devnet-program-data.md"
      - "docs/PRIVACY_README.md"

jobs:
  proof-harness-boundary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install workspace dependencies
        run: npm install --no-fund

      - name: Check proof-harness boundary
        run: npm run check:proof-harness-boundary

      - name: Typecheck proof-harness workspace
        run: npm run typecheck --workspace=@tetsuo-ai/proof-harness-tools

      - name: Test proof-harness workspace
        run: npm run test --workspace=@tetsuo-ai/proof-harness-tools
