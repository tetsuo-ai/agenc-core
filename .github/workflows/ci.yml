name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# NOTE on the required vs informational split:
# The Node/vitest suite is not yet hermetic — a chunk of it shells out to
# system binaries (ripgrep for Glob/Grep, bubblewrap/landlock for the sandbox,
# git for worktree tests) that aren't guaranteed on a vanilla runner, and some
# sandbox tests can't run in a CI container at all. So the REQUIRED gate is the
# reliably-green, high-signal part (typecheck + the isolated Bun suite), and the
# full vitest suite + coverage + the TUI PTY e2e run as INFORMATIONAL jobs
# (best-effort deps installed). Follow-up: hermeticize the env-dependent tests,
# then promote `unit-tests` to required.

jobs:
  # ============ REQUIRED ============
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '25'
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck --workspace=@tetsuo-ai/runtime

  bun-tests:
    name: bun tests (isolated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '25'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: npm install --no-audit --no-fund
      - run: npm run test:bun:isolated --workspace=@tetsuo-ai/runtime

  # ============ INFORMATIONAL (continue-on-error) ============
  unit-tests:
    name: unit tests (vitest) [informational]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '25'
      - name: Install system test deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep bubblewrap
          git config --global user.email ci@example.com
          git config --global user.name "CI"
      - run: npm install --no-audit --no-fund
      - run: npm run test --workspace=@tetsuo-ai/runtime

  coverage:
    name: coverage [informational]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '25'
      - name: Install system test deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep bubblewrap
          git config --global user.email ci@example.com
          git config --global user.name "CI"
      - run: npm install --no-audit --no-fund
      - run: npm run test:coverage --workspace=@tetsuo-ai/runtime
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-summary
          path: runtime/coverage/
          if-no-files-found: ignore

  knip:
    name: knip (unused) [informational]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '25'
      - run: npm install --no-audit --no-fund
      - run: npm run check:unused --workspace=@tetsuo-ai/runtime

  # Embedded-Neovim PTY lifecycle scenarios 120-124 (the real no-orphaned-process
  # gate). TUI-in-headless-CI is timing-sensitive; informational until stabilized.
  neovim-e2e:
    name: embedded-neovim PTY e2e [informational]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '25'
      - name: Install Neovim
        run: sudo apt-get update && sudo apt-get install -y neovim
      - run: npm install --no-audit --no-fund
      - run: npm run build --workspace=@tetsuo-ai/runtime
      - run: npm run check:tui-workbench-buffer-neovim --workspace=@tetsuo-ai/runtime
