name: Package Pack Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/package-pack-smoke.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'README.md'
      - 'packages/agenc/**'
      - 'docs/RUNTIME_API.md'
      - 'docs/DEPLOYMENT_CHECKLIST.md'
      - 'docs/AUTONOMY_RUNTIME_ROLLOUT.md'
      - 'scripts/pack-smoke.mjs'
      - 'scripts/build-public-runtime-artifacts.mjs'
      - 'scripts/prepare-public-agenc-package.mjs'
      - 'scripts/public-agenc-install-smoke.mjs'
      - 'scripts/sync-dashboard-assets.mjs'
      - 'scripts/check-private-kernel-surface.mjs'
      - 'test-fixtures/plugin-kit-channel-adapter/**'
      - 'contracts/desktop-tool-contracts/**'
      - 'runtime/**'
      - 'runtime/README.md'
      - 'mcp/**'
      - 'mcp/README.md'
      - 'docs-mcp/**'
      - 'docs-mcp/README.md'
      - 'web/**'
      - 'docs/PLUGIN_KIT.md'
      - 'docs/VERSION_DOCS_MAP.md'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/package-pack-smoke.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'README.md'
      - 'packages/agenc/**'
      - 'docs/RUNTIME_API.md'
      - 'docs/DEPLOYMENT_CHECKLIST.md'
      - 'docs/AUTONOMY_RUNTIME_ROLLOUT.md'
      - 'scripts/pack-smoke.mjs'
      - 'scripts/build-public-runtime-artifacts.mjs'
      - 'scripts/prepare-public-agenc-package.mjs'
      - 'scripts/public-agenc-install-smoke.mjs'
      - 'scripts/sync-dashboard-assets.mjs'
      - 'scripts/check-private-kernel-surface.mjs'
      - 'test-fixtures/plugin-kit-channel-adapter/**'
      - 'contracts/desktop-tool-contracts/**'
      - 'runtime/**'
      - 'runtime/README.md'
      - 'mcp/**'
      - 'mcp/README.md'
      - 'docs-mcp/**'
      - 'docs-mcp/README.md'
      - 'web/**'
      - 'docs/PLUGIN_KIT.md'
      - 'docs/VERSION_DOCS_MAP.md'

jobs:
  pack-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install workspace dependencies
        run: npm install --no-fund

      - name: Build private-kernel packages
        run: AGENC_SKIP_DASHBOARD_BUILD=1 npm run build:private-kernel

      - name: Build dashboard surface
        run: AGENC_DASHBOARD_BASE=/ui/ npm run build --workspace=@tetsuo-ai/web

      - name: Sync dashboard assets
        run: npm run sync:dashboard-assets

      - name: Check private-kernel surface
        run: npm run check:private-kernel-surface

      - name: Run package pack smoke test
        run: npm run pack:smoke:skip-build

      - name: Run public agenc install smoke test
        run: npm run smoke:public-agenc-install -- --skip-build

  public-install-macos-arm64:
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install workspace dependencies
        run: npm install --no-fund

      - name: Build private-kernel packages
        run: AGENC_SKIP_DASHBOARD_BUILD=1 npm run build:private-kernel

      - name: Build dashboard surface
        run: AGENC_DASHBOARD_BASE=/ui/ npm run build --workspace=@tetsuo-ai/web

      - name: Sync dashboard assets
        run: npm run sync:dashboard-assets

      - name: Run public agenc install smoke test on macOS arm64
        run: npm run smoke:public-agenc-install -- --skip-build

  public-install-min-node:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install workspace dependencies
        run: npm install --no-fund

      - name: Build private-kernel packages
        run: AGENC_SKIP_DASHBOARD_BUILD=1 npm run build:private-kernel

      - name: Setup Node for dashboard build
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh dependencies for dashboard build
        run: npm install --no-fund

      - name: Build dashboard surface
        run: AGENC_DASHBOARD_BASE=/ui/ npm run build --workspace=@tetsuo-ai/web

      - name: Sync dashboard assets
        run: npm run sync:dashboard-assets

      - name: Restore minimum-supported Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run minimum-supported Node public agenc install smoke test
        run: npm run smoke:public-agenc-install -- --skip-build
