name: AgenC required gates
description: Provision the pinned toolchain and run the complete M0 gate contract

inputs:
  expected-sha:
    description: Full Git commit SHA checked out for this gate run
    required: true

runs:
  using: composite
  steps:
    - name: Bind the checkout before executing repository code
      shell: bash
      env:
        EXPECTED_SHA: ${{ inputs.expected-sha }}
      run: |
        set -euo pipefail
        [[ "$EXPECTED_SHA" =~ ^[0-9a-f]{40}$ ]]
        test "$EXPECTED_SHA" = "$GITHUB_SHA"
        test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
        test -z "$(git status --porcelain=v1 --untracked-files=all)"

    - name: Set up the exact Node.js runtime
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: "25.9.0"
        check-latest: false
        package-manager-cache: false

    - name: Install the digest-pinned npm release
      shell: bash
      run: |
        set -euo pipefail
        test "$(node --version)" = "v25.9.0"
        npm_archive="$RUNNER_TEMP/agenc-pinned-npm.tgz"
        npm_prefix="$RUNNER_TEMP/agenc-pinned-npm"
        node scripts/fetch-pinned-npm.mjs "$npm_archive"
        npm install --global --prefix "$npm_prefix" "$npm_archive" \
          --ignore-scripts --no-audit --no-fund
        test "$("$npm_prefix/bin/npm" --version)" = "11.17.0"
        echo "$npm_prefix/bin" >> "$GITHUB_PATH"

    - name: Install the committed dependency graph
      shell: bash
      env:
        npm_config_build_from_source: "false"
      run: |
        test "$(npm --version)" = "11.17.0"
        npm ci --no-audit --no-fund

    - name: Provision the digest-pinned hermetic test image
      shell: bash
      run: |
        set -euo pipefail
        image="$(node -p 'require("./release-toolchain.json").docker.buildImage')"
        [[ "$image" =~ ^node:25\.9\.0-bookworm@sha256:[0-9a-f]{64}$ ]]
        docker pull "$image"
        docker image inspect "$image" >/dev/null

    - name: Run the exact required-gates contract
      shell: bash
      env:
        AGENC_REQUIRED_GATES_SHA: ${{ inputs.expected-sha }}
      run: npm run check:required-gates
