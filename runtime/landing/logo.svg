      <stop offset="0%" stop-color="#5ac8fa"/>
      <stop offset="45%" stop-color="#0077ed"/>
      <stop offset="100%" stop-color="#bf5af2"/>
    </linearGradient>
  </defs>

  <!-- Mark: rounded square + stylized A / agent node -->
