<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="AgenC video poster">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="55%" stop-color="#101018"/>
      <stop offset="100%" stop-color="#050508"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0077ed" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#0077ed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0077ed"/>
      <stop offset="100%" stop-color="#30d158"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <path d="M0 180 H1600 M0 360 H1600 M0 540 H1600 M0 720 H1600"/>
    <path d="M200 0 V900 M400 0 V900 M600 0 V900 M800 0 V900 M1000 0 V900 M1200 0 V900 M1400 0 V900"/>
  </g>

  <!-- center mark -->
  <rect x="742" y="332" width="116" height="116" rx="28" fill="url(#mark)" opacity="0.95"/>
  <path d="M788 368 L788 412 L826 390 Z" fill="#fff" opacity="0.95"/>

  <text x="800" y="520" text-anchor="middle" fill="#f5f5f7" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="44" font-weight="650" letter-spacing="-1.2">AgenC Video</text>
  <text x="800" y="568" text-anchor="middle" fill="#a1a1a6" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="22" letter-spacing="-0.3">Drop media/demo.mp4 to play</text>
</svg>
