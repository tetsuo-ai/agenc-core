<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Breach — FPS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="hud">
    <div id="top-bar">
      <div class="stat"><span class="label">HP</span><div class="bar"><div id="hp-fill"></div></div><span id="hp-text">100</span></div>
      <div class="stat center"><span id="wave-text">WAVE 1</span><span id="score-text">SCORE 0</span></div>
      <div class="stat right"><span class="label">AMMO</span><span id="ammo-text">30 / 90</span></div>
    </div>
    <div id="crosshair">+</div>
    <div id="kill-feed"></div>
    <div id="damage-vignette"></div>
    <div id="hit-marker"></div>
  </div>

  <div id="menu" class="overlay">
    <div class="panel">
      <h1>NEON BREACH</h1>
      <p class="tagline">First-person arena shooter</p>
      <ul class="controls">
        <li><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move</li>
        <li><kbd>Mouse</kbd> Look</li>
        <li><kbd>Click</kbd> Shoot</li>
        <li><kbd>R</kbd> Reload</li>
        <li><kbd>Shift</kbd> Sprint</li>
        <li><kbd>Space</kbd> Jump</li>
        <li><kbd>Esc</kbd> Pause</li>
      </ul>
      <button id="start-btn" class="btn primary">CLICK TO PLAY</button>
      <p class="hint">Survive waves. Headshots deal bonus damage.</p>
    </div>
  </div>

  <div id="pause" class="overlay hidden">
    <div class="panel">
      <h2>PAUSED</h2>
      <button id="resume-btn" class="btn primary">RESUME</button>
      <button id="restart-btn" class="btn">RESTART</button>
    </div>
  </div>

  <div id="gameover" class="overlay hidden">
    <div class="panel">
      <h2>MISSION FAILED</h2>
      <p id="final-stats"></p>
      <button id="again-btn" class="btn primary">TRY AGAIN</button>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="game.js"></script>
</body>
</html>
