storage: /verdaccio/storage/data

plugins: /verdaccio/plugins

# The staged private runtime package currently exceeds Verdaccio's default
# 10mb publish body limit once npm wraps the tarball in publish metadata.
max_body_size: 64mb

web:
  title: AgenC Private Registry

auth:
  htpasswd:
    file: /verdaccio/auth/htpasswd
    max_users: 1000
    algorithm: bcrypt
    rounds: 10

uplinks:
  npmjs:
    url: https://registry.npmjs.org/

packages:
  "@tetsuo-ai-private/*":
    access: $authenticated
    publish: $authenticated
    unpublish: $authenticated
  "@tetsuo-ai/*":
    access: $all
    publish: __verdaccio_public_publish_block__
    unpublish: __verdaccio_public_publish_block__
    proxy: npmjs
  "**":
    access: $all
    publish: $authenticated
    unpublish: $authenticated
    proxy: npmjs

server:
  keepAliveTimeout: 60

middlewares:
  audit:
    enabled: true

log:
  type: stdout
  format: pretty
  level: http

i18n:
  web: en-US
